<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CND Sessions</title>
<style>
:root {
  --bg:        #080910;
  --bg1:       #0f1018;
  --bg2:       #14151f;
  --bg3:       #1a1b28;
  --bg4:       #202130;
  --amber:     #d4920a;
  --amber-dim: rgba(212,146,10,0.12);
  --indigo:    #4455cc;
  --indigo-dim:rgba(68,85,204,0.15);
  --cream:     #e8e5de;
  --muted:     rgba(232,229,222,0.38);
  --dimmer:    rgba(232,229,222,0.16);
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.10);
  --danger:    #c0392b;
  --success:   #27ae60;
  --mono:      'Courier New', monospace;
  --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html,body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.5;
}

/* ── LOADING ─────────────────────────────────────── */
#loadScreen {
  position:fixed; inset:0;
  background: var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:9999;
}
.load-logo {
  font-family: var(--mono);
  font-size:11px; letter-spacing:5px;
  color: var(--amber); text-transform:uppercase;
  margin-bottom:28px;
}
.load-bar {
  width:120px; height:1px;
  background: rgba(255,255,255,0.08);
  overflow:hidden;
}
.load-fill {
  height:100%; background:var(--amber);
  animation: lfill 1.4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes lfill { from{width:0} to{width:100%} }
.load-sub {
  margin-top:16px;
  font-family:var(--mono); font-size:10px;
  letter-spacing:2px; color:var(--dimmer);
  text-transform:uppercase;
}

/* ── LANDING ─────────────────────────────────────── */
#landing {
  display:none;
  max-width:680px; margin:0 auto;
  padding:48px 20px 32px;
}
.session-eyebrow {
  display:flex; align-items:center; gap:8px;
  font-family:var(--mono); font-size:10px;
  letter-spacing:3px; color:var(--amber);
  text-transform:uppercase; margin-bottom:16px;
}
.pulse-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--amber);
  animation: pulse 2.4s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.session-title {
  font-size:26px; font-weight:600; letter-spacing:-.5px;
  color:var(--cream); margin-bottom:6px;
}
.session-client {
  font-family:var(--mono); font-size:11px;
  color:var(--muted); letter-spacing:1px;
  margin-bottom:32px;
}
.engineer-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left:2px solid var(--amber);
  border-radius:0 8px 8px 0;
  padding:16px 18px;
  margin-bottom:28px;
}
.eng-label {
  font-family:var(--mono); font-size:9px;
  letter-spacing:2.5px; color:var(--amber);
  text-transform:uppercase; margin-bottom:8px;
}
.eng-text {
  font-size:13px; color:rgba(232,229,222,.75);
  line-height:1.65;
}
.enter-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:14px;
  background:var(--indigo);
  color:#fff; font-family:var(--mono);
  font-size:11px; font-weight:bold;
  letter-spacing:2.5px; text-transform:uppercase;
  border:none; border-radius:6px;
  cursor:pointer; transition:background .15s;
}
.enter-btn:hover { background:#5566dd; }
.enter-btn:active { background:#3344aa; transform:scale(.99); }

/* ── TRANSPORT ───────────────────────────────────── */
#transport {
  display:none;
  position:sticky; top:0; z-index:200;
  background:rgba(8,9,16,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  align-items:center; gap:12px;
}
#transport.on { display:flex; }

.t-btn {
  width:40px; height:40px; border-radius:50%;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
  transition:all .12s;
  -webkit-user-select:none; user-select:none;
}
.t-play {
  background:var(--amber); color:var(--bg);
  width:44px; height:44px; font-size:16px;
  box-shadow:0 0 0 1px rgba(212,146,10,.3);
}
.t-play:hover { background:#e8a810; }
.t-play:active { transform:scale(.93); }
.t-stop {
  background:var(--bg3); color:var(--muted);
  border:1px solid var(--border); font-size:12px;
}
.t-stop:hover { color:var(--cream); border-color:var(--border2); }

.t-timeline {
  flex:1; display:flex; flex-direction:column;
  gap:4px; min-width:0;
}
.t-scrub {
  position:relative; height:5px;
  background:var(--bg4); border-radius:3px;
  cursor:pointer; touch-action:none;
}
.t-fill {
  height:100%; background:var(--amber); border-radius:2px;
  pointer-events:none;
}
.t-thumb {
  position:absolute; top:50%;
  transform:translate(-50%,-50%);
  width:12px; height:12px;
  background:var(--amber); border-radius:50%;
  pointer-events:none;
  box-shadow:0 0 0 2px rgba(212,146,10,.3);
}
.t-time {
  font-family:var(--mono); font-size:11px;
  color:var(--amber); min-width:90px;
  text-align:right; flex-shrink:0; letter-spacing:.5px;
}

/* ── PLAYER ──────────────────────────────────────── */
#player {
  display:none;
  max-width:680px; margin:0 auto;
  padding:16px 16px 120px;
}
#player.on { display:block; }

/* ── TRACK LIST & DRAG ───────────────────────────── */
#trackList { display:flex; flex-direction:column; gap:6px; }

/* drag ghost */
.track-card.dragging {
  opacity:.4; transform:scale(.99);
}
.track-card.drag-over {
  border-color:var(--indigo) !important;
  box-shadow:0 0 0 1px var(--indigo), 0 4px 24px rgba(68,85,204,.2) !important;
}

/* ── TRACK CARD ──────────────────────────────────── */
.track-card {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg1) 100%);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .18s, box-shadow .18s;
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.track-card.muted { opacity:.35; }
.track-card.soloed {
  border-color:rgba(212,146,10,.35);
  box-shadow:0 0 0 1px rgba(212,146,10,.15);
}

/* ── TRACK HEADER ────────────────────────────────── */
.track-hdr {
  display:grid;
  grid-template-columns:20px 22px 1fr auto auto auto 44px;
  align-items:center; gap:10px;
  padding:12px 14px;
  cursor:pointer;
  -webkit-user-select:none; user-select:none;
  transition:background .12s;
}
.track-hdr:hover { background:rgba(255,255,255,0.015); }

/* drag handle */
.drag-handle {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; cursor:grab; flex-shrink:0;
  padding:4px 0; opacity:.25;
  transition:opacity .15s;
}
.drag-handle:active { cursor:grabbing; }
.track-hdr:hover .drag-handle { opacity:.55; }
.drag-dot { width:3px; height:3px; background:var(--muted); border-radius:50%; }
.drag-dots { display:flex; flex-direction:column; gap:3px; }
.drag-dots-col { display:flex; gap:3px; }

/* track number */
.track-num {
  font-family:var(--mono); font-size:10px;
  color:#706d6a; text-align:center; flex-shrink:0;
}

/* name area */
.track-info { min-width:0; }
.track-name {
  font-size:13px; font-weight:600;
  color:var(--cream); letter-spacing:-.1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.track-type {
  font-family:var(--mono); font-size:9px;
  letter-spacing:1.5px; color:#807d7a;
  text-transform:uppercase; margin-top:1px;
}

/* control buttons */
.t-ctrl {
  width:30px; height:30px; border-radius:6px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  color:#8a8784;
  font-family:var(--mono); font-size:10px; font-weight:700;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s; letter-spacing:.5px;
  -webkit-user-select:none; user-select:none;
}
.t-ctrl:hover {
  background:rgba(255,255,255,.07);
  color:var(--cream); border-color:rgba(255,255,255,.14);
}
.t-ctrl:active { transform:scale(.88); }
.t-ctrl.m-on { background:rgba(192,57,43,.15); color:#e74c3c; border-color:rgba(192,57,43,.35); }
.t-ctrl.s-on { background:var(--amber-dim); color:var(--amber); border-color:rgba(212,146,10,.35); }
.t-ctrl.eq-btn {
  width:auto; padding:0 9px; font-size:9px;
  color:rgba(212,146,10,.45); border-color:rgba(212,146,10,.15);
  letter-spacing:1px;
}
.t-ctrl.eq-btn:hover { color:var(--amber); border-color:rgba(212,146,10,.4); background:var(--amber-dim); }

/* VU */
/* VU METER — segmented L/R */
.track-vu {
  display:grid; grid-template-columns:1fr 1fr;
  gap:2px; width:44px; height:42px;
  padding:5px 4px 4px;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.05);
  border-radius:6px; flex-shrink:0; align-items:end;
}
.vu-col {
  display:flex; flex-direction:column-reverse;
  gap:1.5px; height:100%;
}
.vu-seg {
  width:100%; height:3px; border-radius:.5px;
  background:rgba(255,255,255,.05);
  transition:background .04s;
}
.vu-seg.active.vs0,.vu-seg.active.vs1,
.vu-seg.active.vs2,.vu-seg.active.vs3,
.vu-seg.active.vs4 { background:#16a34a; }
.vu-seg.active.vs5,.vu-seg.active.vs6 { background:#ca8a04; }
.vu-seg.active.vs7 { background:#dc2626; }
.vu-seg.pk { background:rgba(255,255,255,.8) !important; }

/* HORIZONTAL PEAK METER (expanded) */
.pm-wrap { margin-bottom:12px; }
.pm-row {
  display:flex; align-items:center;
  gap:7px; margin-bottom:3px;
}
.pm-ch {
  font-family:var(--mono); font-size:9px;
  color:#706d6a; width:8px; flex-shrink:0;
}
.pm-bar {
  position:relative; flex:1; height:8px;
  background:rgba(0,0,0,.45); border-radius:2px;
}
.pm-fill {
  height:100%; width:0%; border-radius:2px;
  background:linear-gradient(to right,
    #16a34a 0%,#16a34a 65%,
    #ca8a04 65%,#ca8a04 85%,
    #dc2626 85%);
  transition:width .05s linear;
}
.pm-hold {
  position:absolute; top:-1px; bottom:-1px;
  width:2px; background:rgba(255,255,255,.85);
  border-radius:1px; left:0%;
  transition:left .5s cubic-bezier(.2,.8,.2,1);
  pointer-events:none;
}
.pm-db {
  font-family:var(--mono); font-size:9px;
  color:#807d7a; width:58px; text-align:right; flex-shrink:0;
}

/* MASTER STEREO METER */
.master-meter {
  display:flex; flex-direction:column;
  gap:4px; flex:1; min-width:0;
}
.master-m-row { display:flex; align-items:center; gap:6px; }
.master-ch-lbl {
  font-family:var(--mono); font-size:9px;
  color:#706d6a; width:8px; flex-shrink:0;
}
.master-m-bar {
  position:relative; flex:1; height:8px;
  background:rgba(0,0,0,.5); border-radius:2px;
}
.master-m-fill {
  height:100%; width:0%; border-radius:2px;
  background:linear-gradient(to right,
    #16a34a 0%,#16a34a 65%,
    #ca8a04 65%,#ca8a04 85%,
    #dc2626 85%);
  transition:width .05s linear;
}
.master-m-hold {
  position:absolute; top:-1px; bottom:-1px;
  width:2px; background:rgba(255,255,255,.75);
  border-radius:1px; left:0%;
  transition:left .45s cubic-bezier(.2,.8,.2,1);
  pointer-events:none;
}
.master-db {
  font-family:var(--mono); font-size:11px;
  color:#b0ada8; width:44px; text-align:right; flex-shrink:0;
}
.master-divider {
  width:1px; height:24px; flex-shrink:0;
  background:rgba(255,255,255,.07);
}

/* expand chevron (in name area) */
.chevron {
  display:inline-block; margin-right:6px;
  font-size:9px; color:#706d6a;
  transition:transform .2s ease, color .15s;
  vertical-align:middle;
}
.track-card.expanded .chevron { transform:rotate(90deg); color:var(--amber); }

/* ── TRACK BODY ──────────────────────────────────── */
.track-body {
  display:none;
  border-top:1px solid var(--border);
  padding:16px 14px 18px;
  background:rgba(0,0,0,.15);
}
.track-card.expanded .track-body { display:block; }

/* WAVEFORM */
.waveform-wrap {
  position:relative; height:52px;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.05);
  border-radius:6px; overflow:hidden;
  margin-bottom:16px; cursor:pointer;
  touch-action:none;
}
.waveform-wrap canvas { display:block; width:100%; height:100%; }
.playhead {
  position:absolute; top:0; bottom:0; width:1px;
  background:var(--amber); pointer-events:none;
}
.note-pin {
  position:absolute; top:0; bottom:0; width:1px;
  background:rgba(212,146,10,.35); pointer-events:none;
}
.note-pin-dot {
  position:absolute; top:2px; left:-3px;
  width:7px; height:7px;
  background:var(--amber); border-radius:50%;
  opacity:.8;
}

/* SECTION LABEL */
.sec-label {
  font-family:var(--mono); font-size:9px;
  letter-spacing:2px; color:#8a8782;
  text-transform:uppercase;
  display:flex; align-items:center; gap:10px;
  margin:14px 0 8px;
}
.sec-label::after {
  content:''; flex:1; height:1px;
  background:rgba(255,255,255,.05);
}

/* MIXER */
.mixer-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 20px;
  margin-bottom:4px;
}
.mix-ctrl { display:flex; flex-direction:column; gap:5px; }
.mix-lbl {
  font-family:var(--mono); font-size:9px;
  letter-spacing:1.5px; color:#9a9794;
  text-transform:uppercase;
}
.mix-row { display:flex; align-items:center; gap:8px; }
.mix-val {
  font-family:var(--mono); font-size:10px;
  color:#c4c1bb; min-width:30px;
  text-align:right; flex-shrink:0;
}

/* SLIDERS */
input[type=range] {
  -webkit-appearance:none; appearance:none;
  width:100%; height:3px;
  background:rgba(255,255,255,.08);
  border-radius:2px; outline:none;
  cursor:pointer; touch-action:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:16px; height:16px;
  background:var(--cream); border-radius:50%;
  cursor:pointer;
  border:2px solid var(--indigo);
  box-shadow:0 1px 6px rgba(0,0,0,.6);
  transition:transform .1s, border-color .1s;
}
input[type=range]:active::-webkit-slider-thumb {
  transform:scale(1.2);
  border-color:var(--amber);
  background:var(--amber);
}

/* EQ GRID */
.eq-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}
.eq-preset {
  padding:7px 3px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);
  border-radius:5px;
  color:#8c8986;
  font-family:var(--mono); font-size:9px;
  letter-spacing:.3px; text-align:center;
  cursor:pointer;
  transition:all .12s;
  -webkit-user-select:none; user-select:none;
}
.eq-preset:hover { background:rgba(255,255,255,.06); color:var(--cream); border-color:rgba(255,255,255,.12); }
.eq-preset:active { transform:scale(.93); }
.eq-preset.on {
  background:var(--indigo-dim);
  color:#8899ee;
  border-color:rgba(68,85,204,.45);
}
.eq-preset.vocal {
  color:rgba(212,146,10,.5); border-color:rgba(212,146,10,.15);
}
.eq-preset.vocal:hover { color:var(--amber); border-color:rgba(212,146,10,.4); background:var(--amber-dim); }
.eq-preset.vocal.on { background:var(--amber-dim); color:var(--amber); border-color:rgba(212,146,10,.4); }

/* NOTES */
.note-bubble {
  padding:9px 12px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);
  border-radius:7px; margin-bottom:5px;
}
.note-meta {
  display:flex; align-items:center;
  gap:8px; margin-bottom:4px;
}
.note-ts {
  font-family:var(--mono); font-size:10px;
  color:#c4960a; cursor:pointer;
}
.note-ts:hover { text-decoration:underline; }
.note-txt { font-size:12px; color:#b0ada8; line-height:1.5; }
.note-add-row {
  display:grid; grid-template-columns:1fr 36px;
  gap:6px; align-items:center; margin-top:8px;
}
.note-inp {
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.07);
  border-radius:7px; padding:9px 12px;
  color:var(--cream); font-size:12px;
  font-family:var(--sans); width:100%;
  transition:border-color .15s;
}
.note-inp:focus {
  outline:none; border-color:rgba(68,85,204,.5);
  box-shadow:0 0 0 3px rgba(68,85,204,.08);
}
.note-send {
  width:36px; height:36px; border-radius:7px;
  background:var(--indigo); color:#fff;
  border:none; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s;
}
.note-send:hover { background:#5566dd; }
.note-send:active { transform:scale(.92); }

/* ── RTA SHEET ───────────────────────────────────── */
.rta-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); backdrop-filter:blur(10px);
  z-index:500; align-items:flex-end; justify-content:center;
}
.rta-overlay.on { display:flex; }
.rta-sheet {
  background:var(--bg2); border-radius:14px 14px 0 0;
  border:1px solid var(--border); border-bottom:none;
  padding:20px; width:100%; max-width:680px;
}
.rta-head {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:14px;
}
.rta-title {
  font-family:var(--mono); font-size:10px;
  letter-spacing:2.5px; color:var(--amber);
  text-transform:uppercase;
}
.rta-close {
  background:none; border:none; color:var(--muted);
  font-size:20px; cursor:pointer; line-height:1; padding:2px 6px;
}
.rta-close:hover { color:var(--cream); }
#rtaCanvas {
  display:block; width:100%; height:90px;
  background:rgba(0,0,0,.4); border-radius:6px;
  border:1px solid rgba(255,255,255,.05);
  margin-bottom:12px;
}
.rta-findings {
  font-family:var(--mono); font-size:11px;
  color:#a8a5a0; line-height:1.7;
  margin-bottom:14px;
}
.rta-dismiss {
  width:100%; padding:11px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border); border-radius:7px;
  color:var(--muted); font-family:var(--mono);
  font-size:11px; cursor:pointer; transition:all .12s;
}
.rta-dismiss:hover { background:rgba(255,255,255,.09); color:var(--cream); }

/* ── MASTER BAR ──────────────────────────────────── */
#masterBar {
  display:none;
  position:sticky; bottom:0; z-index:100;
  background:rgba(8,9,16,.96);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 16px;
  align-items:center; gap:12px;
  max-width:680px; margin:0 auto;
}
#masterBar.on { display:flex; }
.master-lbl {
  font-family:var(--mono); font-size:10px;
  letter-spacing:2px; color:#b0aead;
  text-transform:uppercase; flex-shrink:0; white-space:nowrap;
}
.master-val {
  font-family:var(--mono); font-size:11px;
  color:#c8c5c0; flex-shrink:0; min-width:36px;
  text-align:right; font-weight:600;
}

/* ── FAB ─────────────────────────────────────────── */
#fab {
  display:none; position:fixed;
  bottom:68px; right:20px; z-index:300;
  width:50px; height:50px; border-radius:50%;
  background:var(--amber); color:var(--bg);
  border:none; font-size:20px; cursor:pointer;
  align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(212,146,10,.35);
  transition:transform .15s, box-shadow .15s;
}
#fab.on { display:flex; }
#fab:hover { transform:scale(1.06); box-shadow:0 6px 28px rgba(212,146,10,.45); }
#fab:active { transform:scale(.93); }

/* ── SUBMIT SHEET ────────────────────────────────── */
.submit-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); backdrop-filter:blur(10px);
  z-index:400; align-items:flex-end; justify-content:center;
}
.submit-overlay.on { display:flex; }
.submit-sheet {
  background:var(--bg2); border-radius:14px 14px 0 0;
  border:1px solid var(--border); border-bottom:none;
  padding:24px 20px; width:100%; max-width:680px;
}
.submit-title {
  font-family:var(--mono); font-size:10px;
  letter-spacing:2.5px; color:var(--amber);
  text-transform:uppercase; margin-bottom:14px;
}
.submit-ta {
  width:100%; background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.07);
  border-radius:8px; padding:12px;
  color:var(--cream); font-size:13px;
  font-family:var(--sans); resize:none; height:90px;
  transition:border-color .15s;
}
.submit-ta:focus { outline:none; border-color:rgba(68,85,204,.5); }
.submit-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
.submit-btn {
  padding:13px; border-radius:8px; border:none;
  font-family:var(--mono); font-size:11px;
  font-weight:700; letter-spacing:1.5px;
  cursor:pointer; transition:all .12s;
  text-transform:uppercase;
}
.submit-btn:active { transform:scale(.97); }
.s-send { background:var(--indigo); color:#fff; }
.s-send:hover { background:#5566dd; }
.s-cancel { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.s-cancel:hover { background:rgba(255,255,255,.09); color:var(--cream); }

/* ── TOAST ───────────────────────────────────────── */
#toastWrap {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%); z-index:1000;
  pointer-events:none;
}
.toast {
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:8px; padding:10px 18px;
  font-family:var(--mono); font-size:11px;
  color:var(--cream); letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  animation:tslide .22s ease;
  white-space:nowrap;
}
@keyframes tslide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── DEBUG ───────────────────────────────────────── */
#dbgTab {
  position:fixed; bottom:80px; left:0; z-index:300;
  background:var(--bg2); border:1px solid var(--border);
  border-left:none; border-radius:0 6px 6px 0;
  padding:10px 8px; font-family:var(--mono);
  font-size:10px; letter-spacing:1px; color:var(--dimmer);
  cursor:pointer; writing-mode:vertical-rl;
  text-orientation:mixed; transform:rotate(180deg);
}
#dbgTab:hover { color:var(--amber); }
#dbgPanel {
  display:none; position:fixed; bottom:0; left:0; right:0;
  height:300px; background:var(--bg1);
  border-top:2px solid var(--indigo); z-index:600;
  flex-direction:column;
}
#dbgPanel.on { display:flex; }
.dbg-head {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:7px 12px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.dbg-head-lbl {
  font-family:var(--mono); font-size:10px;
  letter-spacing:2px; color:var(--amber);
}
.dbg-clear {
  background:none; border:1px solid var(--border);
  color:var(--dimmer); padding:2px 10px;
  border-radius:4px; font-family:var(--mono);
  font-size:10px; cursor:pointer;
}
.dbg-close {
  background:none; border:none; color:var(--dimmer);
  font-size:18px; cursor:pointer; line-height:1; padding:0 4px;
}
#dbgOut { flex:1; overflow-y:auto; padding:4px 0; }
.dlog {
  display:grid;
  grid-template-columns:58px 40px 1fr;
  gap:8px; padding:3px 10px;
  font-family:var(--mono); font-size:11px;
  border-bottom:1px solid rgba(255,255,255,.025);
}
.dlog.warn  { background:rgba(212,146,10,.05); }
.dlog.error { background:rgba(192,57,43,.07); }
.dlog-t { color:rgba(255,255,255,.2); padding-top:1px; }
.dlog-l { font-weight:700; padding-top:1px; }
.dlog.log   .dlog-l { color:rgba(255,255,255,.2); }
.dlog.warn  .dlog-l { color:var(--amber); }
.dlog.error .dlog-l { color:#e74c3c; }
.dlog-m { color:rgba(232,229,222,.75); white-space:pre-wrap; word-break:break-all; line-height:1.5; }
.dbg-inp-row {
  display:flex; border-top:1px solid var(--border); flex-shrink:0;
}
.dbg-prompt {
  padding:10px; font-family:var(--mono);
  font-size:12px; color:var(--amber); flex-shrink:0;
}
.dbg-cmd {
  flex:1; background:transparent; border:none;
  color:var(--cream); font-family:var(--mono);
  font-size:12px; padding:8px 0; outline:none;
}
.dbg-run {
  padding:8px 14px; background:var(--indigo);
  color:#fff; border:none; font-family:var(--mono);
  font-size:11px; cursor:pointer; letter-spacing:.5px;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadScreen">
  <div class="load-logo">CND Sessions</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-sub">Loading session…</div>
</div>

<!-- TRANSPORT -->
<div id="transport">
  <button class="t-btn t-play" id="playBtn" onclick="togglePlay()">▶</button>
  <button class="t-btn t-stop" onclick="stopAll()">■</button>
  <div class="t-timeline">
    <div class="t-scrub" id="scrub">
      <div class="t-fill" id="tFill" style="width:0%"></div>
      <div class="t-thumb" id="tThumb" style="left:0%"></div>
    </div>

<!-- LANDING -->

  <div class="session-title" id="sessTitle">Loading…</div>
  <div class="session-client" id="sessClient"></div>
  <div class="engineer-card">
    <div class="eng-label">Engineer Notes</div>

  <button class="enter-btn" onclick="enterPlayer()">Open Mixer →</button>

<!-- PLAYER -->

</div>

<!-- MASTER BAR -->
<div id="masterBar">
  <div class="master-meter">
    <div class="master-m-row">
      <span class="master-ch-lbl">L</span>
      <div class="master-m-bar">
        <div class="master-m-fill" id="ml-fill"></div>
        <div class="master-m-hold" id="ml-hold"></div>
      </div>
    </div>
    <div class="master-m-row">
      <span class="master-ch-lbl">R</span>
      <div class="master-m-bar">
        <div class="master-m-fill" id="mr-fill"></div>
        <div class="master-m-hold" id="mr-hold"></div>
      </div>
    </div>
  </div>
  <div class="master-db" id="m-db">–∞</div>
  <div class="master-divider"></div>
  <div class="master-lbl">VOL</div>

    oninput="setMasterVol(this.value);document.getElementById('masterVolVal').textContent=this.value+'%'">

<!-- FAB -->

<!-- SUBMIT SHEET -->

      placeholder="Overall notes, revisions, anything for the engineer…"></textarea>

<!-- TOAST -->

<!-- DEBUG TAB -->

<div id="dbgPanel">
  <div class="dbg-head">
    <div class="dbg-head-lbl">Debug Console</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="dbg-clear" onclick="clearDbg()">Clear</button>
      <button class="dbg-close" onclick="toggleDbg()">×</button>
    </div>
  </div>
  <div id="dbgOut"></div>
  <div class="dbg-inp-row">
    <div class="dbg-prompt">›</div>
    <input class="dbg-cmd" id="dbgCmd"
      placeholder="SESSION, trackNotes, isPlaying, togglePlay()…"
      onkeydown="if(event.key==='Enter')runCmd()">
    <button class="dbg-run" onclick="runCmd()">Run</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// DEMO DATA  (replace with Supabase fetch in prod)
// ════════════════════════════════════════════════════
const SESSION = {
  id:'demo-001', project:'Midnight Chronicles', client:'Jay Carter',
  notes:'Mix v2 — low end tightened. Check the 808 against the bass. Vocals are sitting better but let me know if the reverb tail on the hook feels too long.',
  tracks:[
    {id:'t1',name:'Lead Vocals',type:'VOC'},
    {id:'t2',name:'Hook',type:'VOC'},
    {id:'t3',name:'808 Bass',type:'BASS'},
    {id:'t4',name:'Drums',type:'DRUM'},
    {id:'t5',name:'Melody Keys',type:'INST'},
    {id:'t6',name:'Ad Libs',type:'VOC'},
  ]
};

let trackNotes   = { t1:[{ts:'0:23',txt:'Love the reverb here'}], t3:[{ts:'1:05',txt:'Can the 808 come up a little?'}] };
let trackOrder   = SESSION.tracks.map(t=>t.id);   // drag reorder lives here

// ════════════════════════════════════════════════════
// AUDIO ENGINE
// ════════════════════════════════════════════════════
let audioCtx=null, masterGain=null;
let isPlaying=false, currentTime=0, startedAt=0;
const DURATION=180;
let rafId=null;
const nodes={};

const EQ={
  'Flat':null,
  'Telephone':[{t:'highpass',f:500,q:.8},{t:'lowpass',f:3500,q:.8}],
  'Underwater':[{t:'lowpass',f:600,q:.5},{t:'peaking',f:200,g:4,q:1}],
  'Megaphone':[{t:'highpass',f:800,q:1},{t:'lowpass',f:4000,q:1},{t:'peaking',f:2000,g:6,q:2}],
  'Vinyl':[{t:'highshelf',f:8000,g:-10},{t:'peaking',f:60,g:3,q:1}],
  'Radio':[{t:'highpass',f:300,q:1},{t:'lowpass',f:8000,q:.7},{t:'peaking',f:3000,g:4,q:2}],
  'Room':[{t:'peaking',f:250,g:-2,q:1},{t:'peaking',f:5000,g:-3,q:1.5}],
  'Boost Lows':[{t:'lowshelf',f:120,g:6}],
  'Boost Highs':[{t:'highshelf',f:8000,g:5}],
  'Quick Vocal EQ':null,
};

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=.85;
  masterGain.connect(audioCtx.destination);
}
function getNode(id){
  if(nodes[id])return nodes[id];
  const g=audioCtx.createGain(); g.gain.value=.75;
  const p=audioCtx.createStereoPanner(); p.pan.value=0;
  p.connect(g); g.connect(masterGain);
  nodes[id]={gain:g,pan:p,muted:false,soloed:false};
  return nodes[id];
}
function setTrackVol(id,v){   if(audioCtx)getNode(id).gain.gain.value=v/100; }
function setTrackPan(id,v){   if(audioCtx)getNode(id).pan.pan.value=v/100; }
function setMasterVol(v){     if(masterGain)masterGain.gain.value=v/100; }

function toggleMute(id){
  if(!audioCtx)initAudio();
  const n=getNode(id); n.muted=!n.muted;
  const volEl=document.getElementById('vol-'+id);
  n.gain.gain.value=n.muted?0:(volEl?volEl.value/100:.75);
  const card=document.querySelector('[data-track="'+id+'"]');
  const btn=card&&card.querySelector('.mute-btn');
  if(btn)btn.classList.toggle('m-on',n.muted);
  if(card)card.classList.toggle('muted',n.muted);
}
function toggleSolo(id){
  if(!audioCtx)initAudio();
  const n=getNode(id); n.soloed=!n.soloed;
  const card=document.querySelector('[data-track="'+id+'"]');
  const btn=card&&card.querySelector('.solo-btn');
  if(btn)btn.classList.toggle('s-on',n.soloed);
  if(card)card.classList.toggle('soloed',n.soloed);
  const anySolo=Object.values(nodes).some(x=>x.soloed);
  SESSION.tracks.forEach(t=>{
    const nd=getNode(t.id);
    const volEl=document.getElementById('vol-'+t.id);
    const vol=volEl?volEl.value/100:.75;
    nd.gain.gain.value=anySolo?(nd.soloed&&!nd.muted?vol:0):(nd.muted?0:vol);
  });
}
function setEQ(id,preset){
  document.querySelectorAll('[data-track="'+id+'"] .eq-preset').forEach(b=>{
    b.classList.toggle('on',b.dataset.preset===preset);
  });
  if(preset==='Quick Vocal EQ') openRTA(id);
}

// ════════════════════════════════════════════════════
// TRANSPORT
// ════════════════════════════════════════════════════
function togglePlay(){
  if(!audioCtx)initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  isPlaying?pauseAll():startPlay();
}
function startPlay(){
  isPlaying=true; startedAt=audioCtx.currentTime-currentTime;
  document.getElementById('playBtn').textContent='⏸';
  tick(); vuAnim();
}
function pauseAll(){
  isPlaying=false; currentTime=audioCtx.currentTime-startedAt;
  document.getElementById('playBtn').textContent='▶';
  cancelAnimationFrame(rafId); stopVU();
}
function stopAll(){
  isPlaying=false; currentTime=0;
  document.getElementById('playBtn').textContent='▶';
  cancelAnimationFrame(rafId); stopVU(); setHead(0);
}
function tick(){
  rafId=requestAnimationFrame(()=>{
    if(!isPlaying)return;
    currentTime=audioCtx.currentTime-startedAt;
    if(currentTime>=DURATION){stopAll();return;}
    setHead(currentTime/DURATION); tick();
  });
}
function setHead(pct){
  document.getElementById('tFill').style.width=(pct*100)+'%';
  document.getElementById('tThumb').style.left=(pct*100)+'%';
  document.getElementById('tTime').textContent=fmtT(currentTime)+' / '+fmtT(DURATION);
  document.querySelectorAll('.playhead').forEach(el=>el.style.left=(pct*100)+'%');
}

// scrub
const scrub=document.getElementById('scrub');
function doScrub(e){
  const r=scrub.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const pct=Math.max(0,Math.min(1,(cx-r.left)/r.width));
  currentTime=pct*DURATION;
  if(isPlaying)startedAt=audioCtx.currentTime-currentTime;
  setHead(pct);
}
scrub.addEventListener('mousedown',doScrub);
scrub.addEventListener('touchstart',e=>{e.preventDefault();doScrub(e);},{passive:false});
scrub.addEventListener('touchmove',e=>{e.preventDefault();doScrub(e);},{passive:false});

// ════════════════════════════════════════════════════
// VU ANIMATION — segmented, peak hold, master meter
// ════════════════════════════════════════════════════
const vuState={};
function getVS(id){
  if(!vuState[id])vuState[id]={lvl:0,tgt:.5,pk:0,pkT:0,lvlR:0,pkR:0,pkRT:0};
  return vuState[id];
}
let vuRafId=null,vuLastT=0;
let mLvl=0,mLvlR=0,mPk=0,mPkR=0,mPkT=0,mPkRT=0;

function vuAnim(ts=0){
  if(!isPlaying){vuRafId=null;return;}
  if(ts-vuLastT>50){
    vuLastT=ts;
    const now=Date.now();
    SESSION.tracks.forEach(t=>{
      const s=getVS(t.id);
      const nd=nodes[t.id];
      // volume scale from slider (default 0.75 if not yet interacted)
      const volEl=document.getElementById('vol-'+t.id);
      const vol=volEl?volEl.value/100:0.75;
      // mute / solo awareness
      const anySolo=Object.values(nodes).some(x=>x&&x.soloed);
      const silenced=nd&&(nd.muted||(anySolo&&!nd.soloed));
      // smooth random target, zeroed when silenced
      const tgtBase=silenced?0:Math.max(.05,Math.min(.95,s.tgt+(Math.random()-.44)*.28));
      s.tgt=tgtBase;
      s.lvl+=(s.tgt-s.lvl)*.38;
      s.lvlR+=(s.tgt*(0.88+Math.random()*.12)-s.lvlR)*.38;
      // apply volume scale for display (meter reflects fader position)
      const dL=s.lvl*vol;
      const dR=s.lvlR*vol;
      // peak hold L
      if(dL>s.pk){s.pk=dL;s.pkT=now;}
      else if(now-s.pkT>1500)s.pk=Math.max(dL,s.pk-.007);
      // peak hold R
      if(dR>s.pkR){s.pkR=dR;s.pkRT=now;}
      else if(now-s.pkRT>1500)s.pkR=Math.max(dR,s.pkR-.007);
      // update header VU cols
      const vuEl=document.getElementById('vu-'+t.id);
      if(vuEl){
        const cols=vuEl.querySelectorAll('.vu-col');
        if(cols[0])updateVuCol(cols[0],dL,s.pk);
        if(cols[1])updateVuCol(cols[1],dR,s.pkR);
      }
      // update expanded peak meters
      const pfl=document.getElementById('pfl-'+t.id);
      const pfr=document.getElementById('pfr-'+t.id);
      const phl=document.getElementById('phl-'+t.id);
      const phr=document.getElementById('phr-'+t.id);
      const pdb=document.getElementById('pdb-'+t.id);
      if(pfl)pfl.style.width=(dL*100)+'%';
      if(pfr)pfr.style.width=(dR*100)+'%';
      if(phl)phl.style.left=(s.pk*100)+'%';
      if(phr)phr.style.left=(s.pkR*100)+'%';
      if(pdb){const db=dL<.001?'–∞':(20*Math.log10(dL)).toFixed(1);pdb.textContent=db+' dBFS';}
    });
    // master meter — scaled by master vol slider
    const masterVolEl=document.getElementById('masterSlider');
    const masterVol=masterVolEl?masterVolEl.value/100:0.85;
    const mTgt=isPlaying?(.35+Math.random()*.5)*masterVol:0;
    mLvl+=(mTgt-mLvl)*.32;
    mLvlR+=(mTgt*(0.9+Math.random()*.1)-mLvlR)*.32;
    if(mLvl>mPk){mPk=mLvl;mPkT=now;}else if(now-mPkT>1500)mPk=Math.max(mLvl,mPk-.006);
    if(mLvlR>mPkR){mPkR=mLvlR;mPkRT=now;}else if(now-mPkRT>1500)mPkR=Math.max(mLvlR,mPkR-.006);
    const mlf=document.getElementById('ml-fill');
    const mrf=document.getElementById('mr-fill');
    const mlh=document.getElementById('ml-hold');
    const mrh=document.getElementById('mr-hold');
    const mdb=document.getElementById('m-db');
    if(mlf)mlf.style.width=(mLvl*100)+'%';
    if(mrf)mrf.style.width=(mLvlR*100)+'%';
    if(mlh)mlh.style.left=(mPk*100)+'%';
    if(mrh)mrh.style.left=(mPkR*100)+'%';
    if(mdb)mdb.textContent=mLvl<.001?'–∞':(20*Math.log10(mLvl)).toFixed(1);
  }
  vuRafId=requestAnimationFrame(vuAnim);
}

function updateVuCol(col,level,peak){
  const segs=col.querySelectorAll('.vu-seg');
  const n=segs.length;
  const active=Math.round(level*n);
  const pkSeg=Math.min(n-1,Math.round(peak*n));
  segs.forEach((seg,i)=>{
    seg.classList.toggle('active',i<active);
    seg.classList.toggle('pk',i===pkSeg&&i>=active&&peak>.05);
  });
}

function stopVU(){
  if(vuRafId)cancelAnimationFrame(vuRafId);
  vuRafId=null;
  // reset all segs
  document.querySelectorAll('.vu-seg').forEach(s=>{s.classList.remove('active','pk');});
  // reset master
  ['ml-fill','mr-fill'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.width='0%';});
  ['ml-hold','mr-hold'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.left='0%';});
  const mdb=document.getElementById('m-db');if(mdb)mdb.textContent='–∞';
  document.querySelectorAll('.pm-fill').forEach(el=>el.style.width='0%');
  document.querySelectorAll('.pm-hold').forEach(el=>el.style.left='0%');
  document.querySelectorAll('.pm-db').forEach(el=>el.textContent='–∞ dBFS');
  mLvl=mLvlR=mPk=mPkR=0;
}

// ════════════════════════════════════════════════════
// WAVEFORM
// ════════════════════════════════════════════════════
function drawWave(canvas,id){
  const ctx=canvas.getContext('2d');
  const w=canvas.width=canvas.offsetWidth;
  const h=canvas.height=canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);
  const seed=id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const bars=Math.floor(w/2.5);
  for(let i=0;i<bars;i++){
    const amp=.1+.75*Math.abs(Math.sin((i+seed)*.29)*Math.cos((i+seed)*.07+1.1));
    const bh=amp*(h*.82); const x=i*2.5;
    const alpha=i%2===0?.5:.25;
    ctx.fillStyle=`rgba(68,85,204,${alpha})`;
    ctx.fillRect(x,(h-bh)/2,1.5,bh);
  }
}

// ════════════════════════════════════════════════════
// NOTES
// ════════════════════════════════════════════════════
function addNote(id){
  const inp=document.getElementById('ni-'+id);
  const txt=inp.value.trim(); if(!txt)return;
  const ts=fmtT(currentTime);
  if(!trackNotes[id])trackNotes[id]=[];
  trackNotes[id].push({ts,txt}); inp.value='';
  renderNotes(id); pinNote(id,currentTime/DURATION);
}
function renderNotes(id){
  const el=document.getElementById('nt-'+id); if(!el)return;
  el.innerHTML=(trackNotes[id]||[]).map(n=>`
    <div class="note-bubble">
      <div class="note-meta">
        <span class="note-ts" onclick="seekTo(${toSec(n.ts)})">${n.ts}</span>
      </div>
      <div class="note-txt">${n.txt}</div>
    </div>`).join('');
}
function pinNote(id,pct){
  const wrap=document.getElementById('wf-'+id); if(!wrap)return;
  const pin=document.createElement('div'); pin.className='note-pin';
  pin.style.left=(pct*100)+'%';
  pin.innerHTML='<div class="note-pin-dot"></div>';
  wrap.appendChild(pin);
}
function seekTo(sec){
  currentTime=sec;
  if(isPlaying&&audioCtx)startedAt=audioCtx.currentTime-currentTime;
  setHead(currentTime/DURATION);
}

// ════════════════════════════════════════════════════
// RTA
// ════════════════════════════════════════════════════
let rtaAF=null;
function openRTA(id){
  if(!audioCtx)initAudio();
  document.getElementById('rtaFindings').innerHTML=
    '↑ Presence (2–5kHz): forward — vocals sitting well<br>'+
    '↓ Low-mid (~300Hz): slight boxiness detected<br>'+
    '→ Cut −2dB @ 320Hz · Boost +1.5dB @ 3.2kHz<br>'+
    '→ Air (12kHz+): low — consider a gentle high shelf';
  document.getElementById('rtaOverlay').classList.add('on');
  animRTA();
}
function closeRTA(){
  document.getElementById('rtaOverlay').classList.remove('on');
  cancelAnimationFrame(rtaAF);
}
function animRTA(){
  const canvas=document.getElementById('rtaCanvas');
  canvas.width=canvas.offsetWidth; canvas.height=90;
  const ctx2=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  function draw(){
    if(!document.getElementById('rtaOverlay').classList.contains('on'))return;
    rtaAF=requestAnimationFrame(draw);
    ctx2.clearRect(0,0,w,h);
    ctx2.fillStyle='rgba(0,0,0,.4)'; ctx2.fillRect(0,0,w,h);
    const bars=80;
    for(let i=0;i<bars;i++){
      const v=.1+.7*Math.abs(Math.sin(i*.31+Date.now()*.0015));
      const bh=v*h; const x=i*(w/bars);
      ctx2.fillStyle=`hsla(${215+v*25},65%,55%,0.7)`;
      ctx2.fillRect(x,h-bh,w/bars-1,bh);
    }
    ctx2.beginPath(); ctx2.strokeStyle='rgba(212,146,10,.5)'; ctx2.lineWidth=1.5;
    for(let i=0;i<bars;i++){
      const x=(i/bars)*w;
      const y=h-((.45+.2*Math.sin(i*.08-.5*Math.cos(i*.04)))*h);
      i===0?ctx2.moveTo(x,y):ctx2.lineTo(x,y);
    }
    ctx2.stroke();
  }
  draw();
}

// ════════════════════════════════════════════════════
// DEBUG CONSOLE
// ════════════════════════════════════════════════════
const dbgLog=[];
const _log=console.log,_warn=console.warn,_err=console.error;
function pushLog(lvl,args){
  const msg=args.map(a=>{try{return typeof a==='object'?JSON.stringify(a,null,2):String(a);}catch{return String(a);}}).join(' ');
  dbgLog.push({lvl,msg,t:new Date().toLocaleTimeString()});
  if(dbgLog.length>200)dbgLog.shift();
  refreshDbg();
}
console.log=(...a)=>{_log(...a);pushLog('log',a);};
console.warn=(...a)=>{_warn(...a);pushLog('warn',a);};
console.error=(...a)=>{_err(...a);pushLog('error',a);};
window.addEventListener('error',e=>{
  if(!e.message||e.message==='Script error.'||e.message==='Script error')return;
  pushLog('error',['[Uncaught] '+e.message+(e.filename?' @ '+e.filename+':'+e.lineno:'')]);
});
window.addEventListener('unhandledrejection',e=>{
  if(!e.reason)return; pushLog('error',['[Promise] '+e.reason]);
});
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function refreshDbg(){
  const out=document.getElementById('dbgOut');
  if(!out||!document.getElementById('dbgPanel').classList.contains('on'))return;
  out.innerHTML=dbgLog.slice().reverse().map(e=>
    `<div class="dlog ${e.lvl}"><span class="dlog-t">${e.t}</span><span class="dlog-l">${e.lvl.toUpperCase()}</span><span class="dlog-m">${escH(e.msg)}</span></div>`
  ).join('');
}
function toggleDbg(){
  document.getElementById('dbgPanel').classList.toggle('on');
  refreshDbg();
}
function clearDbg(){ dbgLog.length=0; refreshDbg(); }
function runCmd(){
  const inp=document.getElementById('dbgCmd'); const cmd=inp.value.trim(); if(!cmd)return;
  pushLog('log',['> '+cmd]);
  try{ const r=eval(cmd); if(r!==undefined)pushLog('log',[r]); }
  catch(e){ pushLog('error',[e.message]); }
  inp.value='';
}

// ════════════════════════════════════════════════════
// DRAG-TO-REORDER
// ════════════════════════════════════════════════════
let dragSrcId=null;

function initDrag(card,id){
  card.setAttribute('draggable','true');

  card.addEventListener('dragstart',e=>{
    // Only allow drag when the handle was the origin
    if(!e.target.closest('.drag-handle')){e.preventDefault();return;}
    dragSrcId=id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  card.addEventListener('dragend',()=>{
    card.classList.remove('dragging');
    document.querySelectorAll('.track-card').forEach(c=>c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover',e=>{
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    if(dragSrcId&&dragSrcId!==id) card.classList.add('drag-over');
  });
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault(); card.classList.remove('drag-over');
    if(!dragSrcId||dragSrcId===id)return;
    // Reorder trackOrder array
    const si=trackOrder.indexOf(dragSrcId);
    const di=trackOrder.indexOf(id);
    trackOrder.splice(si,1); trackOrder.splice(di,0,dragSrcId);
    // Re-render preserving expanded state
    const expanded=new Set([...document.querySelectorAll('.track-card.expanded')].map(c=>c.dataset.track));
    renderTracks();
    expanded.forEach(tid=>{
      const c=document.querySelector('[data-track="'+tid+'"]');
      if(c)c.classList.add('expanded');
    });
    dragSrcId=null;
    console.log('Track order:',trackOrder.join(', '));
  });

  // Touch drag (basic swap on touchend)
  let touchStartY=0, touchMoved=false;
  const handle=card.querySelector('.drag-handle');
  if(handle){
    handle.addEventListener('touchstart',e=>{
      touchStartY=e.touches[0].clientY; touchMoved=false;
      dragSrcId=id; card.classList.add('dragging');
    },{passive:true});
    handle.addEventListener('touchmove',e=>{touchMoved=true;},{passive:true});
    handle.addEventListener('touchend',e=>{
      card.classList.remove('dragging');
      if(!touchMoved){dragSrcId=null;return;}
      const y=e.changedTouches[0].clientY;
      const target=document.elementFromPoint(50,y);
      if(!target)return;
      const targetCard=target.closest('.track-card');
      if(!targetCard||targetCard===card)return;
      const tid=targetCard.dataset.track;
      const si=trackOrder.indexOf(id); const di=trackOrder.indexOf(tid);
      trackOrder.splice(si,1); trackOrder.splice(di,0,id);
      const expanded=new Set([...document.querySelectorAll('.track-card.expanded')].map(c=>c.dataset.track));
      renderTracks();
      expanded.forEach(eid=>{
        const c=document.querySelector('[data-track="'+eid+'"]');
        if(c)c.classList.add('expanded');
      });
      dragSrcId=null;
    },{passive:true});
  }
}

// ════════════════════════════════════════════════════
// RENDER TRACKS
// ════════════════════════════════════════════════════
function vuHTML(id){
  const segs=Array.from({length:8},(_,i)=>`<div class="vu-seg vs${i}"></div>`).join('');
  return `<div class="track-vu" id="vu-${id}"><div class="vu-col">${segs}</div><div class="vu-col">${segs}</div></div>`;
}

function renderTracks(){
  const list=document.getElementById('trackList');
  const ordered=trackOrder.map(id=>SESSION.tracks.find(t=>t.id===id)).filter(Boolean);

  list.innerHTML=ordered.map((t,i)=>`
    <div class="track-card" data-track="${t.id}">
      <div class="track-hdr" data-trackid="${t.id}">
        <div class="drag-handle" title="Drag to reorder">
          <div class="drag-dots">
            <div class="drag-dots-col"><div class="drag-dot"></div><div class="drag-dot"></div></div>
            <div class="drag-dots-col"><div class="drag-dot"></div><div class="drag-dot"></div></div>
            <div class="drag-dots-col"><div class="drag-dot"></div><div class="drag-dot"></div></div>
          </div>
        </div>
        <div class="track-num">${String(i+1).padStart(2,'0')}</div>
        <div class="track-info">
          <div class="track-name"><span class="chevron">&#9654;</span>${t.name}</div>
          <div class="track-type">${t.type}</div>
        </div>
        <button class="t-ctrl mute-btn" data-trackid="${t.id}">M</button>
        <button class="t-ctrl solo-btn" data-trackid="${t.id}">S</button>
        ${t.type==='VOC'
          ? `<button class="t-ctrl eq-btn" data-trackid="${t.id}">EQ&#8594;</button>`
          : '<span style="width:30px;"></span>'}
        ${vuHTML(t.id)}
      </div>

      <div class="track-body">
        <div class="pm-wrap" id="pm-${t.id}">
          <div class="pm-row">
            <span class="pm-ch">L</span>
            <div class="pm-bar"><div class="pm-fill" id="pfl-${t.id}"></div><div class="pm-hold" id="phl-${t.id}"></div></div>
            <span class="pm-db" id="pdb-${t.id}">–∞ dBFS</span>
          </div>
          <div class="pm-row">
            <span class="pm-ch">R</span>
            <div class="pm-bar"><div class="pm-fill" id="pfr-${t.id}"></div><div class="pm-hold" id="phr-${t.id}"></div></div>
          </div>
        </div>
        <div class="waveform-wrap" id="wf-${t.id}">
          <canvas id="cv-${t.id}"></canvas>
          <div class="playhead" style="left:${(currentTime/DURATION*100)}%"></div>
        </div>

        <div class="sec-label">Mixer</div>
        <div class="mixer-grid">
          <div class="mix-ctrl">
            <div class="mix-lbl">Volume</div>
            <div class="mix-row">
              <input type="range" id="vol-${t.id}" data-trackid="${t.id}" data-type="vol" min="0" max="100" value="75">
              <span class="mix-val" id="vv-${t.id}">75%</span>
            </div>
          </div>
          <div class="mix-ctrl">
            <div class="mix-lbl">Pan</div>
            <div class="mix-row">
              <input type="range" id="pan-${t.id}" data-trackid="${t.id}" data-type="pan" min="-100" max="100" value="0">
              <span class="mix-val" id="pv-${t.id}">C</span>
            </div>
          </div>
          <div class="mix-ctrl">
            <div class="mix-lbl">Reverb</div>
            <div class="mix-row">
              <input type="range" id="rev-${t.id}" data-type="rev" min="0" max="100" value="0">
              <span class="mix-val" id="rv-${t.id}">0%</span>
            </div>
          </div>
          <div class="mix-ctrl">
            <div class="mix-lbl">Delay</div>
            <div class="mix-row">
              <input type="range" id="del-${t.id}" data-type="del" min="0" max="100" value="0">
              <span class="mix-val" id="dv-${t.id}">0%</span>
            </div>
          </div>
        </div>

        <div class="sec-label">EQ Preset</div>
        <div class="eq-grid">
          ${Object.keys(EQ).map(name=>`
            <button class="eq-preset${name==='Flat'?' on':''}${name==='Quick Vocal EQ'?' vocal':''}"
              data-trackid="${t.id}" data-preset="${name}">${name}</button>
          `).join('')}
        </div>

        <div class="sec-label">Timestamped Notes</div>
        <div id="nt-${t.id}"></div>
        <div class="note-add-row">
          <input class="note-inp" id="ni-${t.id}" placeholder="Note at ${fmtT(0)}…">
          <button class="note-send" data-trackid="${t.id}" data-type="addnote">+</button>
        </div>
      </div>
    </div>
  `).join('');

  // ── Bind events DIRECTLY after render (no delegation) ──
  ordered.forEach(t=>{
    const card=document.querySelector('[data-track="'+t.id+'"]');
    if(!card)return;

    // EXPAND — click on header but not on a button
    const hdr=card.querySelector('.track-hdr');
    hdr.addEventListener('click',e=>{
      if(e.target.closest('button'))return;
      card.classList.toggle('expanded');
      if(card.classList.contains('expanded')){
        requestAnimationFrame(()=>{
          const cv=document.getElementById('cv-'+t.id);
          if(cv)drawWave(cv,t.id);
          renderNotes(t.id);
        });
      }
    });

    // MUTE
    card.querySelector('.mute-btn').addEventListener('click',e=>{
      e.stopPropagation(); toggleMute(t.id);
    });
    // SOLO
    card.querySelector('.solo-btn').addEventListener('click',e=>{
      e.stopPropagation(); toggleSolo(t.id);
    });
    // EQ→ vocal btn
    const eqBtn=card.querySelector('.eq-btn');
    if(eqBtn)eqBtn.addEventListener('click',e=>{e.stopPropagation();openRTA(t.id);});

    // WAVEFORM SEEK
    const wf=document.getElementById('wf-'+t.id);
    const seek=(e)=>{
      const r=wf.getBoundingClientRect();
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const pct=Math.max(0,Math.min(1,(cx-r.left)/r.width));
      currentTime=pct*DURATION;
      if(isPlaying&&audioCtx)startedAt=audioCtx.currentTime-currentTime;
      setHead(pct);
    };
    wf.addEventListener('click',seek);
    wf.addEventListener('touchstart',e=>{e.preventDefault();seek(e);},{passive:false});
    wf.addEventListener('touchmove', e=>{e.preventDefault();seek(e);},{passive:false});

    // SLIDERS
    const volEl=document.getElementById('vol-'+t.id);
    const panEl=document.getElementById('pan-'+t.id);
    const revEl=document.getElementById('rev-'+t.id);
    const delEl=document.getElementById('del-'+t.id);
    volEl.addEventListener('input',()=>{
      setTrackVol(t.id,volEl.value);
      document.getElementById('vv-'+t.id).textContent=volEl.value+'%';
    });
    panEl.addEventListener('input',()=>{
      setTrackPan(t.id,panEl.value);
      const v=parseInt(panEl.value);
      document.getElementById('pv-'+t.id).textContent=v===0?'C':(v>0?'R':'L')+Math.abs(v);
    });
    revEl.addEventListener('input',()=>document.getElementById('rv-'+t.id).textContent=revEl.value+'%');
    delEl.addEventListener('input',()=>document.getElementById('dv-'+t.id).textContent=delEl.value+'%');

    // EQ PRESETS
    card.querySelectorAll('.eq-preset').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        setEQ(t.id,btn.dataset.preset);
      });
    });

    // ADD NOTE
    const sendBtn=card.querySelector('.note-send');
    sendBtn.addEventListener('click',e=>{e.stopPropagation();addNote(t.id);});
    const noteInp=document.getElementById('ni-'+t.id);
    noteInp.addEventListener('focus',()=>noteInp.placeholder='Note at '+fmtT(currentTime)+'…');
    noteInp.addEventListener('keydown',e=>{if(e.key==='Enter')addNote(t.id);});

    // DRAG
    initDrag(card,t.id);
  });
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function enterPlayer(){
  document.getElementById('landing').style.display='none';
  document.getElementById('player').classList.add('on');
  document.getElementById('transport').classList.add('on');
  document.getElementById('masterBar').classList.add('on');
  document.getElementById('fab').classList.add('on');
  // Now the canvases have real width — draw all waveforms
  requestAnimationFrame(()=>{
    SESSION.tracks.forEach(t=>{
      const cv=document.getElementById('cv-'+t.id);
      if(cv)drawWave(cv,t.id);
    });
  });
}

function init(){
  document.getElementById('sessTitle').textContent=SESSION.project;
  document.getElementById('sessClient').textContent='Client: '+SESSION.client;
  document.getElementById('engNotes').textContent=SESSION.notes;
  renderTracks();
  setTimeout(()=>{
    const ls=document.getElementById('loadScreen');
    ls.style.transition='opacity .4s'; ls.style.opacity='0';
    setTimeout(()=>{ls.style.display='none'; document.getElementById('landing').style.display='block';},400);
  },1500);
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function fmtT(s){const m=Math.floor(s/60);const sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;}
function toSec(ts){const p=ts.split(':');return parseInt(p[0])*60+parseInt(p[1]);}

// Boot
try{ init(); }catch(e){ console.error('[init failed]',e.message); }
console.log('CND Client — debug ready | Session:',SESSION.project,'|',SESSION.tracks.length,'tracks');
